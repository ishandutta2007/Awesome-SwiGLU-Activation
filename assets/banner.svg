<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#06040a"/>
    </linearGradient>

    <!-- SwiGLU Path Gradients -->
    <linearGradient id="path-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7f00ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="path-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)" rx="15"/>

  <!-- Network / Abstract Graphics -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M 150 0 L 150 250 M 300 0 L 300 250 M 450 0 L 450 250 M 600 0 L 600 250" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- SwiGLU Diagram inside Banner -->
  <circle cx="80" cy="125" r="10" fill="#ffffff" filter="url(#glow)"/>
  <text x="80" y="150" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" text-anchor="middle" font-weight="bold">Input x</text>

  <!-- Split paths -->
  <path d="M 90 125 Q 140 65 190 65" fill="none" stroke="url(#path-grad-1)" stroke-width="4"/>
  <circle cx="190" cy="65" r="18" fill="#7f00ff" filter="url(#glow)"/>
  <text x="190" y="69" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Swish</text>

  <path d="M 90 125 Q 140 185 190 185" fill="none" stroke="url(#path-grad-2)" stroke-width="4"/>
  <circle cx="190" cy="185" r="18" fill="#00f2fe" filter="url(#glow)"/>
  <text x="190" y="189" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">xV</text>

  <!-- Merging paths to Hadamard product -->
  <path d="M 208 65 Q 248 65 288 125" fill="none" stroke="url(#path-grad-1)" stroke-width="4"/>
  <path d="M 208 185 Q 248 185 288 125" fill="none" stroke="url(#path-grad-2)" stroke-width="4"/>
  
  <circle cx="288" cy="125" r="15" fill="#ff007f" filter="url(#glow)"/>
  <text x="288" y="129" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">⊗</text>
  <text x="288" y="152" fill="#ff007f" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" text-anchor="middle" font-weight="bold">Mul</text>

  <!-- Output Node -->
  <path d="M 303 125 L 350 125" fill="none" stroke="#ff007f" stroke-width="4"/>
  <circle cx="350" cy="125" r="8" fill="#ffffff" filter="url(#glow)"/>
  
  <!-- Banner Title & Subtitle -->
  <text x="420" y="105" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="900" letter-spacing="1" filter="url(#glow)">SwiGLU</text>
  <text x="560" y="105" fill="#00f2fe" font-family="'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="900" letter-spacing="1" filter="url(#glow)">Activation</text>
  <text x="420" y="138" fill="#ffffff" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="bold" fill-opacity="0.8">Awesome Evolution, Variants, &amp; Applications</text>
  
  <!-- Technical keywords -->
  <rect x="420" y="160" width="70" height="20" rx="10" fill="#ffffff" fill-opacity="0.1"/>
  <text x="455" y="174" fill="#ff007f" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Llama 3</text>

  <rect x="500" y="160" width="75" height="20" rx="10" fill="#ffffff" fill-opacity="0.1"/>
  <text x="537" y="174" fill="#00f2fe" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">DeepSeek</text>

  <rect x="585" y="160" width="70" height="20" rx="10" fill="#ffffff" fill-opacity="0.1"/>
  <text x="620" y="174" fill="#7f00ff" font-family="'Segoe UI', Roboto, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Mistral</text>

  <!-- Glowing dots for network aesthetic -->
  <circle cx="700" cy="50" r="3" fill="#00f2fe" opacity="0.6"/>
  <circle cx="740" cy="90" r="4" fill="#ff007f" opacity="0.8" filter="url(#glow)"/>
  <circle cx="720" cy="180" r="2" fill="#7f00ff" opacity="0.5"/>
  <circle cx="760" cy="140" r="3" fill="#ffffff" opacity="0.7"/>

  <!-- Connecting thin lines -->
  <line x1="700" y1="50" x2="740" y2="90" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="740" y1="90" x2="760" y2="140" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="760" y1="140" x2="720" y2="180" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
</svg>
